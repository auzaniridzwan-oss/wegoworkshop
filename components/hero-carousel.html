<section id="ux_hero_carousel" class="relative w-full" aria-label="Hero carousel">
  <div class="hero-carousel-viewport relative h-80 overflow-hidden md:h-96">
    <div class="hero-carousel-track flex h-full transition-transform duration-500 ease-in-out"></div>
  </div>
  <button type="button"
    class="hero-carousel-btn hero-carousel-prev group absolute left-4 top-1/2 z-30 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-white/80 text-gray-700 shadow hover:bg-white"
    aria-label="Previous slide"><i class="fa-solid fa-chevron-left"></i></button>
  <button type="button"
    class="hero-carousel-btn hero-carousel-next group absolute right-4 top-1/2 z-30 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-white/80 text-gray-700 shadow hover:bg-white"
    aria-label="Next slide"><i class="fa-solid fa-chevron-right"></i></button>
</section>
