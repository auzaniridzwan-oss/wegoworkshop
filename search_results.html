<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight search results – Wego Workshop</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/wego.css" />
  <script src="https://kit.fontawesome.com/a21f98a3f6.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="ux_header" data-include="components/header.html"></div>

  <div class="layout">
    <aside class="filters">
      <h3>Filters</h3>
      <button type="button" class="btn btn-secondary sort-btn" data-sort="price">SORT BY PRICE</button>
      <button type="button" class="btn btn-secondary sort-btn" data-sort="duration">SORT BY DURATION</button>
      <button type="button" class="btn btn-secondary filter-btn" data-filter="airline">FILTER BY AIRLINE</button>
      <button type="button" class="btn btn-secondary filter-btn" data-filter="depart">FILTER BY DEPART TIME</button>
      <button type="button" class="btn btn-secondary filter-btn" data-filter="arrival">FILTER BY ARRIVAL TIME</button>
    </aside>
    <main class="results">
      <h2>Flights</h2>
      <div id="flight-list"></div>
    </main>
  </div>

  <footer class="site-footer">
    <p>&copy; Wego Workshop – Demo site for Braze integration.</p>
  </footer>

  <script src="js/components/include.js"></script>
  <script src="js/components/header-alpine.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>

  <script src="js/braze.js"></script>
  <script src="js/brazesdk.js"></script>
  <script src="js/components/notifications.js"></script>
  <script src="js/auth-demo.js"></script>
  <script src="js/components/login-overlay.js"></script>
  <script src="js/components/account-overlay.js"></script>
  <script src="js/components/braze-panel.js"></script>
  <script src="js/data.js"></script>
  <script src="js/querystring.js"></script>
  <script src="js/booking-state.js"></script>
  <script>
    (function() {
      const params = getSearchParams();
      const from = params.from || 'SIN';
      const to = params.to || 'KUL';
      const depart = params.depart || new Date().toISOString().slice(0, 10);
      const returnDate = params.return || depart;
      const flightClass = params.class || 'economy';
      const passengers = parseInt(params.passengers, 10) || 1;

      let flights = generateMockFlights({ from, to, departDate: depart, returnDate, class: flightClass, passengers });
      let sortBy = 'price';
      let filterAirline = null;

      function renderFlightCard(flight, index) {
        const div = document.createElement('div');
        div.className = 'flight-card';
        div.innerHTML =
          '<div class="legs">' +
            '<div class="leg">' +
              '<div><div class="airline">' + flight.airlineName + '</div><div class="time">' + flight.departTime + '</div><div class="airport">' + flight.from + ' ' + flight.fromAirport + '</div></div>' +
              '<div class="meta">' + flight.duration + '<br>' + flight.planeType + '</div>' +
              '<div><div class="time">' + flight.arrivalTime + '</div><div class="airport">' + flight.to + ' ' + flight.toAirport + '</div></div>' +
            '</div>' +
            '<div class="leg-divider"></div>' +
            '<div class="leg">' +
              '<div><div class="airline">Return</div><div class="time">' + flight.departTime + '</div><div class="airport">' + flight.to + '</div></div>' +
              '<div class="meta">' + flight.duration + '</div>' +
              '<div><div class="time">' + flight.arrivalTime + '</div><div class="airport">' + flight.from + '</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="price-cell">' +
            '<div class="price">' + flight.priceFormatted + '</div>' +
            '<button type="button" class="btn btn-primary buy-btn" data-index="' + index + '">BUY</button>' +
          '</div>';
        return div;
      }

      function render() {
        let list = flights.slice();
        if (filterAirline) list = list.filter(f => f.airlineId === filterAirline);
        if (sortBy === 'price') list.sort((a, b) => a.price - b.price);
        else if (sortBy === 'duration') list.sort((a, b) => a.durationMinutes - b.durationMinutes);
        const container = document.getElementById('flight-list');
        container.innerHTML = '';
        list.forEach(function(f, i) {
          const originalIndex = flights.indexOf(f);
          const card = renderFlightCard(f, originalIndex);
          card.querySelector('.buy-btn').addEventListener('click', function() {
            setBookingState({
              from, to, depart, return: returnDate, class: flightClass, passengers,
              flightIndex: originalIndex
            });
            window.location.href = 'booking-baggage.html';
          });
          container.appendChild(card);
        });
      }

      document.querySelectorAll('.sort-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          sortBy = this.getAttribute('data-sort');
          render();
        });
      });
      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const f = this.getAttribute('data-filter');
          if (f === 'airline') filterAirline = filterAirline ? null : flights[0].airlineId;
          render();
        });
      });

      render();
    })();
  </script>
</body>
</html>
