<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wego Workshop – Flights, Hotels &amp; Car Rentals</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/wego.css" />
  <script src="https://kit.fontawesome.com/a21f98a3f6.js" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Header -->
  <div id="ux_header" data-include="components/header.html"></div>

  <!-- Hero carousel -->
  <div id="ux_hero_carousel" data-include="components/hero-carousel.html"></div>

  <!-- Search -->
  <div class="tabs" role="tablist">
    <button type="button" role="tab" aria-selected="true" class="active"><i class="fa-solid fa-plane-departure"></i>
      FLIGHTS</button>
    <button type="button" role="tab" aria-selected="false"><i class="fa-solid fa-bed"></i> HOTELS</button>
    <button type="button" role="tab" aria-selected="false"><i class="fa-solid fa-car"></i> CAR RENTALS</button>
  </div>

  <!-- Search section -->
  <section class="search-section">
    <form id="flight-search" class="search-form" aria-label="Flight search">
      <div class="form-group">
        <label for="from-city">From city</label>
        <select id="from-city" name="from" required>
          <option value="">Select city</option>
        </select>
      </div>
      <div class="form-group">
        <label for="to-city">To city</label>
        <select id="to-city" name="to" required>
          <option value="">Select city</option>
        </select>
      </div>
      <div class="form-group">
        <label for="depart-date">Depart date</label>
        <input type="date" id="depart-date" name="depart" required />
      </div>
      <div class="form-group">
        <label for="return-date">Return date</label>
        <input type="date" id="return-date" name="return" />
      </div>
      <div class="form-group">
        <label for="class">Class</label>
        <select id="class" name="class">
          <option value="economy">Economy</option>
          <option value="premium_economy">Premium Economy</option>
          <option value="business">Business</option>
          <option value="first">First</option>
        </select>
      </div>
      <div class="form-group">
        <label for="passengers">Passengers</label>
        <input type="number" id="passengers" name="passengers" min="1" max="9" value="1" />
      </div>
      <button type="submit" class="btn btn-primary">SEARCH FLIGHTS</button>
    </form>
  </section>

  <!-- Promo feed -->
  <div id="ux_promo_feed" data-include="components/promo-feed.html"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; Wego Workshop – Demo site for Braze integration. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/components/include.js"></script>

  <script src="js/braze.js"></script>
  <script src="js/brazesdk.js"></script>
  <script src="js/components/notifications.js"></script>
  <script src="js/auth-demo.js"></script>
  <script src="js/components/login-overlay.js"></script>
  <script src="js/components/account-overlay.js"></script>
  <script src="js/components/braze-panel.js"></script>
  <script src="js/components/hero-carousel.js"></script>
  <script src="js/components/promo-feed.js"></script>
  <script src="js/data.js"></script>
  <script src="js/querystring.js"></script>
  <script src="js/booking-state.js"></script>
  <script>
    (function () {
      resetBookingState();
      const fromSelect = document.getElementById('from-city');
      const toSelect = document.getElementById('to-city');
      TRAVEL_CITIES.forEach(function (city) {
        fromSelect.appendChild(new Option(city.name + ' (' + city.id + ')', city.id));
        toSelect.appendChild(new Option(city.name + ' (' + city.id + ')', city.id));
      });
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('depart-date').min = today;
      document.getElementById('return-date').min = today;
      document.getElementById('depart-date').addEventListener('change', function () {
        document.getElementById('return-date').min = this.value || today;
      });
      document.getElementById('flight-search').addEventListener('submit', function (e) {
        e.preventDefault();
        const from = document.getElementById('from-city').value;
        const to = document.getElementById('to-city').value;
        const depart = document.getElementById('depart-date').value;
        const ret = document.getElementById('return-date').value;
        const cls = document.getElementById('class').value;
        const passengers = document.getElementById('passengers').value || '1';
        setSearchParams({ from, to, depart, return: ret, class: cls, passengers });


        //BRAZE SDK - Track event
        if (window.BrazeHelpers) {
          var searchParams = {
            "origin": from,
            "destination": to,
            "depart": depart,
            "return": ret,
            "class": cls,
            "passengers": passengers
          };

          window.BrazeHelpers.trackEvent('searched-flight', searchParams);
        }

        window.location.href = 'search_results.html';
      });
    })();
  </script>
</body>

</html>
