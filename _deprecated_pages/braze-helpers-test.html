<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrazeHelpers Unit Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1.5rem; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.25rem; }
    #summary { margin: 1rem 0; padding: 0.75rem; border-radius: 6px; font-weight: 600; }
    #summary.pass { background: #d4edda; color: #155724; }
    #summary.fail { background: #f8d7da; color: #721c24; }
    #results { list-style: none; padding: 0; margin: 0; }
    #results li { padding: 0.25rem 0; border-bottom: 1px solid #eee; }
    #results li.fail { color: #c00; }
    #results li.pass { color: #0a0; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>BrazeHelpers unit tests</h1>
  <p>Loads Braze Web SDK (CDN), <code>braze.js</code>, and <code>brazesdk.js</code>. Tests run against the actual SDK (no mocks).</p>
  <button id="run-tests">Run tests</button>
  <div id="summary"></div>
  <ul id="results"></ul>

  <script src="js/braze.js"></script>
  <script src="js/brazesdk.js"></script>
  <script src="js/braze-helpers.test.js"></script>
  <script>
    document.getElementById('run-tests').addEventListener('click', function() {
      var out = BrazeHelpersTest.run();
      var el = document.getElementById('summary');
      var list = document.getElementById('results');
      list.innerHTML = '';
      el.className = out.failed === 0 ? 'pass' : 'fail';
      el.textContent = out.passed + ' passed, ' + out.failed + ' failed (total ' + (out.passed + out.failed) + ')';
      out.results.forEach(function(r) {
        var li = document.createElement('li');
        li.className = r.ok ? 'pass' : 'fail';
        li.textContent = (r.ok ? '✓ ' : '✗ ') + r.message;
        list.appendChild(li);
      });
    });
  </script>
</body>
</html>
